name: Release — build image + Mac/Windows installers + publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 1.0.0)"
        required: true

permissions:
  contents: write   # needed for gh release create
  packages: write   # needed for ghcr push

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          PKG_VERSION="$(node -p "require('./web/package.json').version")"
          echo "tag: $TAG_VERSION"
          echo "pkg: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::web/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION). Bump package.json before tagging."
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mizan:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/mizan:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=Mizan — Security Posture, Measured
            org.opencontainers.image.licenses=MIT

      # Extract the matching CHANGELOG entry as the GitHub Release body so
      # the in-app updater (Settings → About & updates) can show release
      # notes alongside the version. CHANGELOG entries start with the
      # version line "- **YYYY-MM-DD — vX.Y.Z (...)**." — we capture
      # everything from that line up to the next entry's bullet.
      - name: Extract CHANGELOG section
        id: notes
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          {
            echo "body<<MIZAN_NOTES_EOF"
            awk -v tag="v$TAG_VERSION" '
              /^- \*\*[0-9]{4}-[0-9]{2}-[0-9]{2} — / {
                if (capture) { exit }
                if (index($0, tag) > 0) { capture = 1 }
              }
              capture { print }
            ' CHANGELOG.md
            echo ""
            echo "Container image: \`ghcr.io/${{ github.repository_owner }}/mizan:$TAG_VERSION\`"
            echo "MIZAN_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # Create the GitHub Release. The in-app updater queries
      # /repos/{owner}/{repo}/releases/latest — without this step the
      # docker image goes to ghcr but the dashboard's "About & updates"
      # panel can't see new versions and stays stuck on "you're on the
      # latest release" forever. Idempotent: if a release already exists
      # for this tag (e.g. backfill via workflow_dispatch), update it.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG="v$TAG_VERSION"
          NOTES=$(cat <<'MIZAN_NOTES_BODY'
          ${{ steps.notes.outputs.body }}
          MIZAN_NOTES_BODY
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes."
            gh release edit "$TAG" \
              --title "Mizan $TAG" \
              --notes "$NOTES"
          else
            echo "Creating release $TAG."
            gh release create "$TAG" \
              --title "Mizan $TAG" \
              --notes "$NOTES" \
              --latest
          fi

  # ---------- Mac .pkg installer ----------
  # v2.5.8+ — build a macOS .pkg and attach it to the GitHub Release as
  # a downloadable asset. The in-app updater (Settings → About) on Mac
  # installs surfaces a "Download Mizan-X.Y.Z.pkg" button that points
  # at this asset, so operators upgrade by clicking the button + running
  # the installer. The .pkg is unsigned for now (no Apple Developer ID
  # in CI); customers who want a signed copy can re-sign locally with
  # productsign + notarytool, see deploy/mac-build.sh.
  build-mac-pkg:
    needs: build-and-push
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build .pkg
        env:
          VERSION: ${{ steps.tag.outputs.value }}
        run: |
          cd web
          bash deploy/mac-build.sh
          ls -la deploy/dist/

      - name: Upload .pkg to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.tag.outputs.value }}"
          PKG="web/deploy/dist/mizan-${{ steps.tag.outputs.value }}.pkg"
          # `gh release upload --clobber` overwrites a previous upload of
          # the same filename — safe for `workflow_dispatch` re-runs.
          gh release upload "$TAG" "$PKG" --clobber

  # ---------- Windows .msi installer ----------
  # Same shape as the Mac job: build the installer on a windows-latest
  # runner, attach it to the same GitHub Release as a downloadable
  # asset. Unsigned for now; customers signing locally can run signtool
  # against the .msi from web/deploy/dist/.
  build-windows-msi:
    needs: build-and-push
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix

      - name: Build .msi
        env:
          MIZAN_VERSION: ${{ steps.tag.outputs.value }}
        shell: pwsh
        run: |
          cd web
          ./deploy/windows-build.ps1 -Version $env:MIZAN_VERSION
          dir deploy/dist

      - name: Upload .msi to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ steps.tag.outputs.value }}"
          MSI="web/deploy/dist/mizan-${{ steps.tag.outputs.value }}.msi"
          gh release upload "$TAG" "$MSI" --clobber
