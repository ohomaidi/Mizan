name: Release — build image + publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 1.0.0)"
        required: true

permissions:
  contents: write   # needed for gh release create
  packages: write   # needed for ghcr push

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          PKG_VERSION="$(node -p "require('./web/package.json').version")"
          echo "tag: $TAG_VERSION"
          echo "pkg: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::web/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION). Bump package.json before tagging."
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mizan:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/mizan:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=Mizan — Security Posture, Measured
            org.opencontainers.image.licenses=MIT

      # Extract the matching CHANGELOG entry as the GitHub Release body so
      # the in-app updater (Settings → About & updates) can show release
      # notes alongside the version. CHANGELOG entries start with the
      # version line "- **YYYY-MM-DD — vX.Y.Z (...)**." — we capture
      # everything from that line up to the next entry's bullet.
      - name: Extract CHANGELOG section
        id: notes
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          {
            echo "body<<MIZAN_NOTES_EOF"
            awk -v tag="v$TAG_VERSION" '
              /^- \*\*[0-9]{4}-[0-9]{2}-[0-9]{2} — / {
                if (capture) { exit }
                if (index($0, tag) > 0) { capture = 1 }
              }
              capture { print }
            ' CHANGELOG.md
            echo ""
            echo "Container image: \`ghcr.io/${{ github.repository_owner }}/mizan:$TAG_VERSION\`"
            echo "MIZAN_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # Create the GitHub Release. The in-app updater queries
      # /repos/{owner}/{repo}/releases/latest — without this step the
      # docker image goes to ghcr but the dashboard's "About & updates"
      # panel can't see new versions and stays stuck on "you're on the
      # latest release" forever. Idempotent: if a release already exists
      # for this tag (e.g. backfill via workflow_dispatch), update it.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG="v$TAG_VERSION"
          NOTES=$(cat <<'MIZAN_NOTES_BODY'
          ${{ steps.notes.outputs.body }}
          MIZAN_NOTES_BODY
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes."
            gh release edit "$TAG" \
              --title "Mizan $TAG" \
              --notes "$NOTES"
          else
            echo "Creating release $TAG."
            gh release create "$TAG" \
              --title "Mizan $TAG" \
              --notes "$NOTES" \
              --latest
          fi
